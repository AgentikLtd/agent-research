schema_version: a2a/1.2

agent:
  name: genesys-research
  version: 0.2.0
  description: |
    Twice-weekly intelligence brief on Genesys Cloud CX — feature releases,
    market shifts, practitioner signal, vendor strategy. Decomposes the topic,
    runs parallel autonomous web researchers, verifies findings adversarially,
    then synthesises a styled brief. Output: one markdown brief dispatched via
    the hub channel-router (event_id=scheduled_summary, routes to agentmail /
    web-inbox) + persisted to workspace storage.
    Audience: a Principal Genesys engineer running a UK motor-insurance
    contact-centre estate.
  vendor: AgentikLtd
  homepage: https://github.com/AgentikLtd/agent-research
  endpoints:
    base_url: http://localhost:4003
    a2a: /a2a
    health: /health
    chat: /a2a
    metrics: /metrics
    lifecycle: /lifecycle
  capabilities:
    streaming: false
    push_notifications: false
    long_running_tasks: true
  skills:
    - id: run-brief
      description: Orchestrate plan → research → challenge → synthesize → dispatch.
      input_modes: [json]
      output_modes: [json]
      visibility: a2a
    - id: plan-research
      description: Decompose a research topic into focused, rounded research angles.
      input_modes: [json]
      output_modes: [json]
      visibility: a2a
    - id: research-angle
      description: Autonomously research one angle with web search; emit Finding[].
      input_modes: [json]
      output_modes: [json]
      visibility: a2a
    - id: challenge-findings
      description: Adversarially verify researcher findings with independent web search.
      input_modes: [json]
      output_modes: [json]
      visibility: a2a
    - id: synthesize-brief
      description: Synthesise verified findings into the final styled markdown brief.
      input_modes: [json]
      output_modes: [json]
      visibility: a2a
    - id: dispatch-brief
      description: Deliver the brief via the hub channel-router and persist to storage.
      input_modes: [json]
      output_modes: [json]
      visibility: a2a
    - id: gather-sources
      description: Fetch and normalise source items from configured research sources.
      input_modes: [json]
      output_modes: [json]
      visibility: a2a
  authentication:
    schemes: [bearer]

x-agentik/lifecycle:
  install_script: scripts/install.sh
  uninstall_script: scripts/uninstall.sh
  data_handling_on_uninstall: prompt
  estimated_storage_mb_per_month: 50

x-agentik/runtime:
  container_image: ghcr.io/agentikltd/agent-research:0.2.1
  resources:
    memory_mb: 512
    cpu: 0.5
  required_secrets: []                  # No per-agent OAuth or API keys. Reddit JSON is public; vendor pages public.
  required_external_services:
    - hub_llm_gateway
    - hub_channel_dispatch
    - hub_storage
  egress_allowlist:
    # Web search runs on OpenRouter's infrastructure (ADR-0018); no article-domain entries needed.
    - orchestrators.genesys.com         # Beyond Community
    - help.genesys.cloud                # Administrator help / release notes
    - www.reddit.com                    # r/callcentres
    - www.genesys.com                   # Newsroom
    - www.cxtoday.com                   # Industry coverage

x-agentik/model:
  default: anthropic/claude-sonnet-4-6
  recommended_for_quality: anthropic/claude-opus-4-7
  minimum_capable: anthropic/claude-haiku-4-5-20251001
  per_skill_overrides:
    plan-research:      anthropic/claude-haiku-4-5-20251001
    research-angle:     anthropic/claude-sonnet-4-6
    challenge-findings: anthropic/claude-sonnet-4-6
    synthesize-brief:   anthropic/claude-opus-4-7
  provider_preference:
    - any
  required_capabilities:
    tool_use: full
    prompt_caching: preferred

x-agentik/budget:
  hourly_soft_cap_gbp: 1.00
  hourly_hard_cap_gbp: 2.00
  daily_hard_cap_gbp: 5.00
  per_task_token_cap: 200000
  max_turns: 20
  cost_aware_fallback_model: anthropic/claude-sonnet-4-6

x-agentik/schedule:
  scheduled_tasks:
    - id: produce-brief-tue
      schedule: "0 6 * * 2"            # Tue 06:00
      task: run-brief
      missed_run_policy: skip
      timezone: Europe/London
    - id: produce-brief-thu
      schedule: "0 6 * * 4"            # Thu 06:00
      task: run-brief
      missed_run_policy: skip
      timezone: Europe/London
    - id: consolidate-memories
      schedule: "0 3 * * *"            # Daily 03:00 — extract facts from episodic transcripts
      task: consolidate-memories
      missed_run_policy: skip
      timezone: Europe/London

x-agentik/storage:
  primary: namespace
  estimated_size_gb: 0.2
  workspace_required: true
  read_access:
    - agent: genesys-research
      paths:
        - workspace://genesys/briefs/*
  write_access:
    - agent: genesys-research
      paths:
        - workspace://genesys/briefs/*

x-agentik/memory:
  episodic:
    backend: postgres
    schema: agent_research_episodic       # Tier 2 follow-up (2026-05-26) — read by the install saga so agent_profiles.config.memory_schemas is populated automatically. Matches migrations/0001_episodic.sql.
    retention_days: 90
  semantic:
    backend: pgvector
    schema: agent_research_semantic       # Mirrors migrations/0002_semantic.sql. Both schemas are required for the per-agent memory viewer to read transcripts + facts.
    embedding_model: text-embedding-3-small
    decay: relevance_threshold
  procedural:
    backend: qmd
    path: skills/

x-agentik/output_channels:
  - id: scheduled_summary
    routes_to: [agentmail]
    fallback_order: [agentmail, web-inbox]

x-agentik/dependencies:
  shares_data_with: []

x-agentik/quality:
  eval_suite_dir: ./test/evals
  baseline_scorecard: ./test/evals/scorecards/baseline.json
  right_model_audit_cadence: quarterly

x-agentik/knowledge:
  enabled: false
  max_size_mb: 500
  auto_refresh_url_days: 7
  embedding_model: text-embedding-3-small
  allowed_callers: []

# NOTE: The agent_profiles.config defaults (persona, guardrails, sources, output)
# are provisioned by the install saga from the AgentikLtd agent-template-registry
# and not stored in manifest.yaml (x-agentik/defaults is not in the schema).
# The per-run model override and web_search.max_results are documented here
# as a reference for operators:
#   - run-brief accepts { model: "<openrouter-slug>" } to pin the pipeline per run.
#   - web_search max_results defaults to 6 in the research-angle + challenge-findings skills.
